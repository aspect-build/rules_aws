name: CI - Vanilla Bazel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      matrix:
        # Note: linux is also tested on Buildkite via Aspect Workflows
        os:
          - ubuntu-latest
          - macos-latest
          # TODO(alex): https://github.com/aspect-build/rules_aws/issues/14
          # - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
      - run: bazel test //... --test_tag_filters=-requires-docker
  run_cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: run CLI with bzlmod
        working-directory: e2e/smoke
        run: bazel run @aws help
      - name: run CLI with workspace
        working-directory: e2e/smoke
        run: bazel run --enable_workspace @aws help
